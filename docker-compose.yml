version: "3.7"

services:
  proxy:
    image: raul72/browsermob-proxy
    ports:
      - 8080:8080
      - 8081-8181:8081-8181
    environment:
      BMP_PROXY_PORT_RANGE: 8081-8181
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8080/proxy"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s
  # docker-compose --profile test up --abort-on-container-exit
  test:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      TEST_SERVER_HOST_FOR_PROXY: test
      PROXY_HOST: proxy
    command: ["yarn", "test"]
    depends_on:
      proxy:
        condition: service_healthy
    profiles:
      - test

